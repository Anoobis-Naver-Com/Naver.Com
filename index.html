<!doctype html>
<html lang="ko">
<head>
    <title>Wallpaper - NeoMatrix</title>
    <meta name="author" content="IP.AF">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <style>
@font-face {
    font-family: "Master";
    src: url("ETC/(MASTER).ttf") format("truetype");
}

* {
    margin: 0;
    padding: 0;
}

body {
    background: black;
}

canvas {
    display: block;
    position: absolute;
}

#debug {
    position: absolute;
    bottom: 0;
    left: 0;
    color: lime;
    font-size: 1.25em;
    white-space: pre-wrap;
    display: flex;
    flex-direction: column-reverse;
    padding: 0;
    margin: 0;
    opacity: 1;
}

.hide {
    transition: opacity 2s 5s ease-in-out;
    opacity: 0 !important;
}

.mask {
    visibility: hidden;
    position: absolute;
    z-index: -2;
}

#info-overlay {
    position: absolute;
    pointer-events: none;
    z-index: 15;
}

#gui-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 9998;
}
#gui-overlay.open {
    display: block;
}

#gui {
    position: fixed;
    top: 0;
    right: 0;
    z-index: 9999;
}

#gui.gui-open {
    top: calc(5% + 26px);
    right: auto;
    left: 50%;
    transform: translateX(-50%);
    position: fixed;
}

#gui-drag-handle {
    display: none;
    position: fixed;
    z-index: 10000;
    height: 26px;
    background: #1a1a2e;
    border-bottom: 1px solid #444;
    cursor: grab;
    user-select: none;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    box-sizing: border-box;
}
#gui-drag-handle.open {
    display: flex;
}
#gui-drag-handle:active { cursor: grabbing; }
#gui-drag-handle-dots { display: flex; gap: 5px; pointer-events: none; }
#gui-drag-handle-dots span {
    width: 11px; height: 11px; border-radius: 50%; display: block;
}
#gui-drag-handle-dots span:nth-child(1) { background: #ff5f56; cursor: pointer; pointer-events: all; }
#gui-drag-handle-dots span:nth-child(2) { background: #ffbd2e; }
#gui-drag-handle-dots span:nth-child(3) { background: #27c93f; }
#gui-drag-handle-title {
    color: #999; font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    pointer-events: none;
}

    </style>

    <div id="cube-scene" style="position:fixed;inset:0;perspective:900px;pointer-events:none;z-index:10;">

            <div id="cube-fixed-panel" style="position:absolute;overflow:hidden;border-radius:10px;border:2px solid rgba(255,255,255,0.7);box-shadow:0 0 24px rgba(255,255,255,0.18),inset 0 0 10px rgba(255,255,255,0.08);z-index:10;perspective:600px;transform-style:preserve-3d;cursor:pointer;pointer-events:all;">

                        <div class="cube-face-wrap"><div class="cube-face-wiggle"><div class="cube-face"><div class="cube-face-inner"><img src="CUBE/(CUBE-03).png" alt="f2"></div></div></div></div>
                        <div class="cube-face-wrap"><div class="cube-face-wiggle"><div class="cube-face"><div class="cube-face-inner"><img src="CUBE/(CUBE-04).png" alt="f3"></div></div></div></div>
                        <div class="cube-face-wrap"><div class="cube-face-wiggle"><div class="cube-face"><div class="cube-face-inner"><img src="CUBE/(CUBE-05).png" alt="f4"></div></div></div></div>
                        <div class="cube-face-wrap"><div class="cube-face-wiggle"><div class="cube-face"><div class="cube-face-inner"><img src="CUBE/(CUBE-06).png" alt="f5"></div></div></div></div>
                        <div class="cube-face-wrap"><div class="cube-face-wiggle"><div class="cube-face"><div class="cube-face-inner"><img src="CUBE/(CUBE-07).png" alt="f6"></div></div></div></div>
                        <div class="cube-face-wrap"><div class="cube-face-wiggle"><div class="cube-face"><div class="cube-face-inner"><img src="CUBE/(CUBE-08).png" alt="f7"></div></div></div></div>

    .cube-face { position:absolute;overflow:hidden;border-radius:10px;border:2px solid rgba(255,255,255,0.55);box-shadow:0 0 18px rgba(255,255,255,0.12),inset 0 0 8px rgba(255,255,255,0.06); }

        function _applyWeatherBtnTransform() {
            var wrap = document.getElementById('weatherBtnWrap');
            var btn  = document.getElementById('weatherBtn');
            if (!wrap || !btn) return;
            var oxPct = parseFloat(options.ui_weather_btnOffsetX) || 0;
            var oyPct = parseFloat(options.ui_weather_btnOffsetY) || 0;
            var rot   = parseFloat(options.ui_weather_btnRotation) || 0;

            var W = window.innerWidth, H = window.innerHeight;

            var prevTransform = btn.style.transform;
            btn.style.transform = 'none';
            var bw = btn.offsetWidth  || 80;
            var bh = btn.offsetHeight || 26;
            btn.style.transform = prevTransform;

            var rotRad = (rot % 360) * Math.PI / 180;
            var cosR = Math.cos(rotRad), sinR = Math.sin(rotRad);
            var hw = bw / 2, hh = bh / 2;
            var corners = [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
            var ptsX = corners.map(function(c){ return c[0]*cosR - c[1]*sinR; });
            var ptsY = corners.map(function(c){ return c[0]*sinR + c[1]*cosR; });
            var minPX = Math.min.apply(null,ptsX), maxPX = Math.max.apply(null,ptsX);
            var minPY = Math.min.apply(null,ptsY), maxPY = Math.max.apply(null,ptsY);

            var initCx = W / 2, initCy = H / 2;

            function vtxBounds(pivotX, pivotY) {
                return {
                    minX: pivotX + minPX, maxX: pivotX + maxPX,
                    minY: pivotY + minPY, maxY: pivotY + maxPY
                };
            }
            var b0 = vtxBounds(initCx, initCy);
            var spR = Math.max(0, W - b0.maxX);
            var spL = Math.max(0, b0.minX);
            var spT = Math.max(0, b0.minY);
            var spB = Math.max(0, H - b0.maxY);

            var cx = initCx + (oxPct >= 0 ? (oxPct/100)*spR : (oxPct/100)*spL);
            var cy = initCy + (oyPct >= 0 ? -(oyPct/100)*spT : -(oyPct/100)*spB);

            var b1 = vtxBounds(cx, cy);
            if (b1.minX < 0) cx -= b1.minX;
            else if (b1.maxX > W) cx -= (b1.maxX - W);
            var b2 = vtxBounds(cx, cy);
            if (b2.minY < 0) cy -= b2.minY;
            else if (b2.maxY > H) cy -= (b2.maxY - H);

            wrap.style.left = cx + 'px';
            wrap.style.top  = cy + 'px';

            btn.style.left      = (-bw/2) + 'px';
            btn.style.top       = (-bh/2) + 'px';
            btn.style.transform = 'rotate(' + rot + 'deg)';
        }

            var _maskTip = (m.radius + 1) * 2.2;
            var _maskMid = (m.radius + 1) * 0.45;
            var _hx = m.x + ox, _hy = m.y + oy;
            _offCtx.beginPath();
            _offCtx.moveTo(_hx,            _hy - _maskTip);
            _offCtx.lineTo(_hx + _maskMid, _hy);
            _offCtx.lineTo(_hx,            _hy + _maskTip);
            _offCtx.lineTo(_hx - _maskMid, _hy);
            _offCtx.closePath();
            _offCtx.moveTo(_hx - _maskTip, _hy);
            _offCtx.lineTo(_hx,            _hy - _maskMid);
            _offCtx.lineTo(_hx + _maskTip, _hy);
            _offCtx.lineTo(_hx,            _hy + _maskMid);
            _offCtx.closePath();
            _offCtx.fillStyle = 'rgba(0,0,0,1)';
            _offCtx.fill();
            _offCtx.restore();

            _offCtx.save();
            _offCtx.shadowColor = m.color;
            _offCtx.shadowBlur  = m.radius * 4;
            _offCtx.fillStyle   = m.color;
            var _tip = m.radius * 2.2;
            var _mid = m.radius * 0.45;
            _offCtx.beginPath();
            _offCtx.moveTo(_hx,        _hy - _tip);
            _offCtx.lineTo(_hx + _mid, _hy);
            _offCtx.lineTo(_hx,        _hy + _tip);
            _offCtx.lineTo(_hx - _mid, _hy);
            _offCtx.closePath();
            _offCtx.fill();
            _offCtx.beginPath();
            _offCtx.moveTo(_hx - _tip, _hy);
            _offCtx.lineTo(_hx,        _hy - _mid);
            _offCtx.lineTo(_hx + _tip, _hy);
            _offCtx.lineTo(_hx,        _hy + _mid);
            _offCtx.closePath();
            _offCtx.fill();
            _offCtx.restore();

            mctx.save();
            mctx.globalAlpha = c.opacity;
            mctx.drawImage(_offCanvas, minX, minY);
            mctx.restore();
        }

        var mLastTime = null;
        function mLoop(ts) {
            if (isPaused) { mLastTime = null; mAnimId = requestAnimationFrame(mLoop); return; }
            if (!mLastTime) mLastTime = ts;
            var dt = Math.min(ts - mLastTime, 32);
            mLastTime = ts;

            mctx.clearRect(0, 0, mW, mH);

            
            var t = ts / 1000;
            for (var si = 0; si < bgStars.length; si++) {
                var s = bgStars[si];
                var alpha = s.base * (0.4 + 0.6 * (Math.sin(t * s.speed + s.phase) * 0.5 + 0.5));
                var tip = s.r * 2.2;
                var mid = s.r * 0.45;
                mctx.save();
                mctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
                mctx.beginPath();
                mctx.moveTo(s.x,       s.y - tip);
                mctx.lineTo(s.x + mid, s.y);
                mctx.lineTo(s.x,       s.y + tip);
                mctx.lineTo(s.x - mid, s.y);
                mctx.closePath();
                mctx.fill();
                mctx.beginPath();
                mctx.moveTo(s.x - tip, s.y);
                mctx.lineTo(s.x,       s.y - mid);
                mctx.lineTo(s.x + tip, s.y);
                mctx.lineTo(s.x,       s.y + mid);
                mctx.closePath();
                mctx.fill();
                mctx.restore();
            }

            
            for (var mi = 0; mi < meteors.length; mi++) {
                var m = meteors[mi];
                if (m.born === null) m.born = ts + m.delay;
                if (ts < m.born) continue;
                m.x += m.vx * dt;
                m.y += m.vy * dt;
                if (m.y - m.radius > mH + 50 || m.y + m.radius < -50 ||
                    m.x < -mW * 0.5 || m.x > mW * 1.5) {
                    var nm = makeMeteor(); nm.born = ts;
                    meteors[mi] = nm;
                }
                drawMeteor(meteors[mi]);
            }

            mAnimId = requestAnimationFrame(mLoop);
        }

        function mStart() {
            if (mAnimId) return;
            mResize();
            makeBgStars();
            makeMeteors();
            mLastTime = null;
            mc.style.display = 'block';
            mAnimId = requestAnimationFrame(mLoop);
        }

        function mStop() {
            if (mAnimId) { cancelAnimationFrame(mAnimId); mAnimId = null; }
            mctx.clearRect(0, 0, mW, mH);
            mc.style.display = 'none';
        }

        
        window._meteorApplyOptions = function() {
            if (!mAnimId) return;
            var c   = _getCfg();
            var dir = _angleToDir(c.angle);
            if (bgStars.length !== c.starCount) makeBgStars();
            makeMeteors();
            while (meteors.length < c.count) meteors.push(makeMeteor());
            if (meteors.length > c.count) meteors.length = c.count;
            for (var i = 0; i < meteors.length; i++) {
                var vBase = (0.4 + Math.random() * 0.3) * (c.speed / 4);
                meteors[i].vx = dir.vx * vBase;
                meteors[i].vy = dir.vy * vBase;
            }
        };

        window.addEventListener('resize', function() {
            mResize();
            makeBgStars();
        });

        
        window._meteorSetVisible = function(visible) {
            if (visible) mStart(); else mStop();
        };
    })();

};
    </script>
    <script>
    (function() {
        var guiEl    = document.getElementById('gui');
        var overlay  = document.getElementById('gui-overlay');
        var handle   = document.getElementById('gui-drag-handle');
        var closeDot = document.getElementById('gui-close-dot');

        
        var _posLeft = null, _posTop = null;

        function _getGuiWidth() {
            return guiEl.offsetWidth || 245;
        }

        
        function _syncHandle() {
            var rect = guiEl.getBoundingClientRect();
            handle.style.left  = rect.left + 'px';
            handle.style.top   = (rect.top - 26) + 'px';
            handle.style.width = rect.width + 'px';
        }

        function openGui() {
            var gui = window._lilGuiInstance;
            if (gui && typeof gui.open === 'function') gui.open(true);
            
            if (_posLeft !== null) {
                guiEl.style.cssText = 'position:fixed;left:' + _posLeft + 'px;top:' + _posTop + 'px;z-index:9999;transform:none;';
            } else {
                guiEl.style.cssText = '';
            }
            guiEl.classList.add('gui-open');
            overlay.classList.add('open');
            handle.classList.add('open');
            requestAnimationFrame(_syncHandle);
        }

        function closeGui() {
            var gui = window._lilGuiInstance;
            if (gui && typeof gui.close === 'function') gui.close();
            guiEl.classList.remove('gui-open');
            overlay.classList.remove('open');
            handle.classList.remove('open');
            guiEl.style.cssText = 'position:fixed;top:0;right:0;z-index:9999;';
            _posLeft = null; _posTop = null;
        }

        
        closeDot.addEventListener('click', function(e) {
            e.stopPropagation();
            closeGui();
        });

        overlay.addEventListener('click', function() { closeGui(); });

        
        var _dragging = false, _dragOffX = 0, _dragOffY = 0;

        function _dragStart(cx, cy) {
            var rect = guiEl.getBoundingClientRect();
            _dragOffX = cx - rect.left;
            _dragOffY = cy - (rect.top - 26); 
            _dragging = true;
        }

        function _dragMove(cx, cy) {
            if (!_dragging) return;
            var gw  = _getGuiWidth();
            var gh  = guiEl.offsetHeight + 26;
            var nl  = Math.max(0, Math.min(cx - _dragOffX, window.innerWidth  - gw));
            var nt  = Math.max(26, Math.min(cy - _dragOffY + 26, window.innerHeight - gh + 26));
            _posLeft = nl;
            _posTop  = nt;
            guiEl.style.cssText = 'position:fixed;left:' + nl + 'px;top:' + nt + 'px;z-index:9999;transform:none;';
            handle.style.left  = nl + 'px';
            handle.style.top   = (nt - 26) + 'px';
            handle.style.width = gw + 'px';
        }

        function _dragEnd() { _dragging = false; }

        handle.addEventListener('mousedown', function(e) {
            if (e.target === closeDot) return;
            e.preventDefault();
            _dragStart(e.clientX, e.clientY);
        });
        document.addEventListener('mousemove', function(e) { _dragMove(e.clientX, e.clientY); });
        document.addEventListener('mouseup', _dragEnd);

        handle.addEventListener('touchstart', function(e) {
            if (e.target === closeDot) return;
            _dragStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        handle.addEventListener('touchmove', function(e) {
            if (!_dragging) return;
            e.stopPropagation();
            _dragMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        handle.addEventListener('touchend', _dragEnd, { passive: true });

        
        window.addEventListener('resize', function() {
            if (handle.classList.contains('open')) requestAnimationFrame(_syncHandle);
        });

        
        function isOnClock(x, y) {
            var r = window._clockHitRect;
            if (!r) return false;
            var pad = 40;
            var rx = r.x !== undefined ? r.x : (r.pivotX - r.w / 2);
            var ry = r.y !== undefined ? r.y : (r.pivotY - r.h / 2);
            return x >= rx - pad && x <= rx + r.w + pad &&
                   y >= ry - pad && y <= ry + r.h + pad;
        }

        var swipeStartY = 0, swipeStartX = 0, swipeMoved = false, swipeValid = false;

        document.addEventListener('touchstart', function(e) {
            if (guiEl.classList.contains('gui-open')) return;
            swipeStartX = e.touches[0].clientX;
            swipeStartY = e.touches[0].clientY;
            swipeMoved = false;
            swipeValid = isOnClock(swipeStartX, swipeStartY);
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            if (!swipeValid || guiEl.classList.contains('gui-open')) return;
            var dy = e.touches[0].clientY - swipeStartY;
            var dx = e.touches[0].clientX - swipeStartX;
            if (Math.abs(dy) > Math.abs(dx) && dy > 60) swipeMoved = 'down';
            if (Math.abs(dy) > Math.abs(dx) && dy < -60) swipeMoved = 'up';
        }, { passive: true });

        document.addEventListener('touchend', function() {
            if (swipeValid && swipeMoved === 'down') { swipeMoved = false; swipeValid = false; openGui(); }
            else if (swipeValid && swipeMoved === 'up') { swipeMoved = false; swipeValid = false; if (window._fetchLocation) window._fetchLocation(); }
            else if (swipeValid && !swipeMoved) { swipeValid = false; if (window._fetchLocation) window._fetchLocation(); }
            else { swipeValid = false; }
        }, { passive: true });

        document.addEventListener('mousedown', function(e) {
            if (guiEl.classList.contains('gui-open')) return;
            swipeStartX = e.clientX;
            swipeStartY = e.clientY;
            swipeMoved = false;
            swipeValid = isOnClock(swipeStartX, swipeStartY);
        });

        document.addEventListener('mousemove', function(e) {
            if (!swipeValid || guiEl.classList.contains('gui-open')) return;
            if (e.buttons !== 1) return;
            var dy = e.clientY - swipeStartY;
            var dx = e.clientX - swipeStartX;
            if (Math.abs(dy) > Math.abs(dx) && dy > 60) swipeMoved = 'down';
            if (Math.abs(dy) > Math.abs(dx) && dy < -60) swipeMoved = 'up';
        });

        document.addEventListener('mouseup', function() {
            if (swipeValid && swipeMoved === 'down') { swipeMoved = false; swipeValid = false; openGui(); }
            else if (swipeValid && swipeMoved === 'up') { swipeMoved = false; swipeValid = false; if (window._fetchLocation) window._fetchLocation(); }
            else if (swipeValid && !swipeMoved) { swipeValid = false; if (window._fetchLocation) window._fetchLocation(); }
            else { swipeValid = false; }
        });

        
        var observer = new MutationObserver(function() {
            var title = guiEl.querySelector('.lil-gui.root > .title');
            if (title) {
                title.style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(guiEl, { childList: true, subtree: true });

        closeGui();
    })();
    </script>
